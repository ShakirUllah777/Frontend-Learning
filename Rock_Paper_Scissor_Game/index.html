<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="game-container">
        <h1>Rock Scissor Paper</h1>

        <div class="choices">
            <button class="choice" data-choice="rock">🪨 Rock</button>
            <button class="choice" data-choice="paper">📄 Paper</button>
            <button class="choice" data-choice="scissors">✂️ Scissors</button>
        </div>


        <div class="result">
            <p id="user-choice">Your Choice: -</p>
            <p id="computer-choice">Computer Choice: -</p>
            <h2 id="winner">Choose an option!</h2>
        </div>

        <div class="scoreboard">
            <p>Your: <span id="user-score">0</span></p>
            <p>Computer: <span id="computer-score">0</span></p>
        </div>


    </div>








    <script src="script.js"></script>
</body>

</html>
